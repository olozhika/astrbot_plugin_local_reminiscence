name: astrbot_plugin_local_reminiscence # 插件唯一识别名，以 astrbot_plugin_ 前缀开头
display_name: 本地回忆[APLR] # 用于展示的名字，可以是方便人类阅读的名字（需要版本 >= v4.5.0，低版本不会报错，请放心填写）
desc: 轻量级本地记忆插件，使用本地Embedding模型、本地数据库存储和回忆聊天记录。无需额外API，零Embedding成本，节约Token，完全保护隐私。使用Cron Job自动记录对话，通过关键词和语义匹配帮助AI自动回忆起相关经历和概念。初次安装时请科学上网以便快速下载依赖。多对话及群聊支持！跨对话、跨平台长期记忆！ 
version: v1.1.1 # 插件版本号。格式：v1.1.1 或者 v1.1
author: olozhika # 作者
repo: https://github.com/olozhika/astrbot_plugin_local_reminiscence # 插件的仓库地址
